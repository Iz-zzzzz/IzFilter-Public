name: รายงานปัญหา
description: ใช้สำหรับเมื่อพบว่า "filter list นี้" block ผิดพลาด
labels: ["Unsorted"]
body:
  - type: markdown
    attributes:
      value: "credit https://github.com/AdguardTeam/AdguardFilters/blob/master/.github/ISSUE_TEMPLATE/bug_report.yml"
    
  - type: checkboxes
    attributes:
      label: แบบสอบถาม
      description: |
        เพื่อป้องกันการรายงานผิดพลาด กรุณาตรวจสอบ และยืนยันตามรายการด้านล่าง
        options:
        - label: Iz's Addon Filter ที่พบปัญหาได้ทำการ update เป็น version ล่าสุดแล้ว ใช่หรือไม่?
          required: true
        - label: AdBlock Extension หรือ Application ที่ใช้เป็น version ล่าสุดแล้ว ใช่หรือไม่?
          required: true
        - label: Browser ที่ใช้งานและพบปัญหาเป็น version ล่าสุดแล้ว ใช่หรือไม่?
          required: true
        - label: ถ้าปิดการใช้งาน Iz's Addon Filter จะไม่พบปัญหาที่เกิดขึ้น ใช่หรือไม่?
          required: true
        - label: มีเนื้อหา NSFW ใช่หรือไม่? เตือน!! กรุณาซ่อน screenshot ที่จะใส่ในช่องด้านล่างใต้ spoiler
          required: false
          
  - type: dropdown
    attributes:
      label: ใช้ Iz's Addon Filter บน AdBlock Extension หรือ Application อะไร
      multiple: true
      options:
        - AdGuard Browser Extension
        - AdGuard Content Blocker (Android)
        - AdGuard for Android
        - AdGuard for Mac หรือ Windows
        - AdGuard for Safari
        - uBlock Origin Browser Extension
        - uBlock Lite Browser Extension
        - Brave Browser built-in adblock
        - Other ad blocker
    validations:
      required: true

  - type: input
    attributes:
      label: AdBlock Extension หรือ Application version อะไร
      description: AdBlock Extension หรือ Application version ที่พบอาการเป็น version อะไร
      placeholder: ตัวอย่างเช่น 1.56.1
    validations:
      required: true

  - type: dropdown
    id: what-happened
    attributes:
      label: What type of problem have you encountered?
      description: If the problem does not fall under any category that is listed here, please contact our tech support - support@adguard.com
      multiple: true
      options:
        - โฆษณาหรืออื่นๆ ไม่ครบถ้วน
        - website ทำงานไม่ปกติ
        - AdBlock ถูกตรวจจับได้โดย website
        - analytics or tracker ที่ไม่ได้ block
        - website อันตราย
        - block ไม่ตรงตาม จุดประสงค์ (ที่หน้า readme ใต้หัวข้อแรก)
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Browser ที่ใช้งานและพบ bug คือ?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - Opera
        - other (specify in comment below)
        - AdGuard Application
    validations:
      required: true

  - type: dropdown
    attributes:
      label: ชนิดของอุปกรณ์ที่พบปัญหา
      multiple: false
      options:
        - Desktop (Windows PC, MacOS)
        - Mobile (Smartphone. Tablet)
    validations:
      required: true

  - type: input
    attributes:
      label: URL ของ website ที่พบปัญหา
      description: กรุณาใส่ URL ให้ครบถ้วน
      placeholder: ตัวอย่างเช่น https://example.com/
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ‎‎‎‎‎‎‎‎
  - type: markdown
    attributes:
      value: "### Filter list อื่นๆ ที่ใช้งานด้วยกัน ขณะพบปัญหา"

  - type: textarea
    attributes:
      value: |
        กรุณาใส่ ชื่อของ filter อื่นๆ ที่ใช้งาน ขณะพบปัญหา

  - type: markdown
    attributes:
      value: |
        ‎‎‎‎‎‎‎‎
  - type: dropdown
    attributes:
      label: Stealth Mode ที่ใช้งานขณะพบปัญหา (เฉพาะ AdGuard)
      description: กรุณาเลือก option ของ Stealth mode ขณะพบปัญหา
      multiple: true
      options:
        - Hide your search queries
        - Send Do-Not-Track signals
        - Self-destruction of third-party cookies
        - Self-destruction of first-party cookies
        - Disable cache for third-party requests
        - Block third-party Authorization header
        - Block WebRTC
        - Block Push API
        - Block Location API
        - Hide Referrer from third-parties (specify in comment below, if used custom value)
        - Hide your User-Agent (specify in comment below, if used custom value)
        - Mask your IP address (specify in comment below, if used custom value)
        - Remove X-Client-Data header from HTTP requests
        - Protect from DPI

  - type: textarea
    attributes:
      label: ใส่หมายเหตุ และ screenshot
      description: |
        1. ใส่ screenshot ขณะพบปัญหา พร้อมวงจุดที่เกิดปัญหาให้เรียบร้อย ()
          ใช้ `<details> </details>` ครอบเนื้อหาที่ต้องการซ่อนใต้ spoilter
        2. อธิบายอย่างละเอียด ให้เข้าใจได้ว่าปัญหาคืออะไร
        3. กล่าวถึง ปัจจัยอื่นๆ ที่ developer ควรทราบ

        เตือน!! กรุณา blur ข้อมูลส่วนตัว หรือ "เนื้อหา NSFW"
      value: |
          1. <หมายเหตุ>

          2. Screenshots
          <details><summary>Screenshot 1:</summary>

          <!-- วาง screenshot ที่นี้ -->

          </details>

    validations:
      required: true

  - type: checkboxes
    attributes:
      label: ความเป็นส่วนตัว
      description: คุณได้แน่ใจแล้วว่า ไดเ้ตรวจสอบว่า ไม่มีข้อมูลส่วนตัวของคุณใน issue นี้
      options:
        - label: คุณได้ตรวจสอบว่า ไม่มีข้อมูลส่วนตัวของคุณใน issue นี้
          required: true
        - label: คุณได้ซ่อน screenshot ภายใต้ spoiler เรียบร้อย และกดดู preview เพื่อตรวจสอบแล้ว
          required: true
